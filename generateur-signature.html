<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Email Master Template | Edition Tech</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00F2FE;
            --blue-tech: #0367A6;
            --dark: #011F4B;
            --bg: #000814;
            --text: #f4f4f4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #011F4B 0%, #000 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-app { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Cinzel', serif; color: var(--neon); font-size: 2rem; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }

        .app-container {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
            align-items: start;
        }

        .form-panel {
            background: rgba(1, 31, 75, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--blue-tech);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.1);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.65rem; color: var(--neon); margin-bottom: 5px; text-transform: uppercase; font-family: 'Cinzel'; letter-spacing: 1px; }
        input, textarea {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--blue-tech);
            color: #fff;
            border-radius: 8px;
            font-family: 'Montserrat';
            font-size: 0.85rem;
            transition: 0.3s;
        }
        textarea { height: 120px; resize: none; }
        input:focus, textarea:focus { border-color: var(--neon); outline: none; box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }

        .preview-panel { position: sticky; top: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .signature-wrapper {
            background: #011F4B;
            padding: 30px 15px;
            border-radius: 10px;
            border: 2px solid var(--blue-tech);
            width: 100%;
            max-width: 650px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .btn-prestige {
            width: 100%;
            padding: 18px;
            background: var(--blue-tech);
            color: #ffffff;
            border: 1px solid var(--neon);
            border-radius: 10px;
            font-family: 'Cinzel';
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-prestige:hover { background: var(--neon); color: var(--dark); transform: translateY(-3px); box-shadow: 0 0 20px var(--neon); }

        .status-msg { margin-top: 10px; color: var(--neon); font-weight: bold; font-size: 0.8rem; }

        @media (max-width: 1100px) {
            .app-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="header-app">
    <h1>IA Master Engine</h1>
</div>

<div class="app-container">
    <div class="form-panel">
        <div class="input-group">
            <label>Corps du mail</label>
            <textarea id="mail_body">Bonjour Khrystyna,

Bien reçu, merci. Pour finaliser la mise en ligne de l'annonce, je vous prie de compléter ce formulaire.

Excellente journée.</textarea>
        </div>
        <div class="input-group"><label>Prénom</label><input type="text" id="name" value="Julien"></div>
        <div class="input-group"><label>Fonction</label><input type="text" id="job" value="Directeur commercial"></div>
        <div class="input-group"><label>Téléphone</label><input type="text" id="phone" value="06 61 74 75 73"></div>
        <div class="input-group"><label>Lien Calendly</label><input type="text" id="calendly" value="https://calendar.app.google/iCzfE1GQrjxM3ZQ56"></div>
        <div class="input-group"><label>URL Bannière</label><input type="text" id="banner_url" value="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/histoire%20Happy%20House/baniere/Bannie%CC%80reHH%20entete.png"></div>
    </div>

    <div class="preview-panel">
        <div class="signature-wrapper" id="live_preview"></div>
        <button class="btn-prestige" onclick="copyHTML()">Copier le Template Tech</button>
        <div class="status-msg" id="status"></div>
    </div>
</div>

<script>
    const inputs = ['name', 'job', 'phone', 'calendly', 'banner_url', 'mail_body'];

    function build() {
        const v = {};
        inputs.forEach(id => {
            let val = document.getElementById(id).value;
            if (val.includes('github.com') && val.includes('/blob/')) {
                val = val.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
            }
            v[id] = val;
        });

        const formattedBody = v.mail_body.replace(/\n/g, '<br>');

        const html = `
<table cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: #011F4B; padding: 30px 10px;">
    <tr>
        <td align="center">
            <table cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width: 600px; background-color: #ffffff; border-radius: 0px; overflow: hidden;">
                <!-- BANNIÈRE TECH -->
                <tr>
                    <td style="padding: 0;">
                        <img src="${v.banner_url}" alt="Header" width="600" style="display: block; width: 100%; height: auto;">
                    </td>
                </tr>
                <!-- LIGNE NÉON -->
                <tr><td height="3" style="background-color: #00F2FE; line-height: 3px; font-size: 3px;">&nbsp;</td></tr>
                
                <!-- MESSAGE (ZONE BLANCHE) -->
                <tr>
                    <td style="padding: 40px; color: #011F4B; font-family: Arial, sans-serif; font-size: 16px; line-height: 1.6; background-color: #ffffff;">
                        ${formattedBody}
                    </td>
                </tr>

                <!-- SIGNATURE SECTION (FOND DARK) -->
                <tr>
                    <td style="background-color: #011F4B; padding: 40px 20px; text-align: center; font-family: Arial, sans-serif;">
                        <!-- BOUTON RDV NÉON -->
                        <a href="${v.calendly}" target="_blank" style="display: inline-block; background-color: #0367A6; color: #ffffff; padding: 15px 40px; text-decoration: none; font-size: 13px; font-weight: bold; border-radius: 5px; letter-spacing: 2px; text-transform: uppercase; border: 1px solid #00F2FE;">PRENDRE RENDEZ-VOUS</a>
                        
                        <div style="height: 1px; background-color: #0367A6; margin: 30px auto; width: 80%;"></div>
                        
                        <!-- INFO PERSO -->
                        <div style="color: #00F2FE; font-size: 18px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;">${v.name}</div>
                        <div style="color: #ffffff; font-size: 14px; margin-bottom: 10px;">${v.job}</div>
                        <div style="color: #00F2FE; font-size: 14px; font-weight: bold;">${v.phone}</div>
                        
                        <div style="height: 1px; background-color: #0367A6; margin: 30px auto; width: 80%;"></div>
                        
                        <!-- APP PROMO -->
                        <div style="color: #00F2FE; font-size: 13px; font-weight: bold; letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase;">TÉLÉCHARGEZ NOTRE APPLICATION</div>
                        
                        <!-- APP BUTTONS (RAW ICONS) -->
                        <table cellpadding="0" cellspacing="0" border="0" align="center">
                            <tr>
                                <td style="padding: 0 10px;">
                                    <img src="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/histoire%20Happy%20House/doc%20HH/appli-2.jpg" alt="App Store" width="130" style="border-radius: 5px; border: 1px solid #0367A6;">
                                </td>
                                <td style="padding: 0 10px;">
                                    <img src="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/histoire%20Happy%20House/doc%20HH/appli-2.jpg" alt="Google Play" width="130" style="border-radius: 5px; border: 1px solid #0367A6;">
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>`;
        
        document.getElementById('live_preview').innerHTML = html;
        return html;
    }

    inputs.forEach(id => document.getElementById(id).addEventListener('input', build));
    build();

    function copyHTML() {
        const code = build();
        navigator.clipboard.writeText(code).then(() => {
            const s = document.getElementById('status');
            s.innerText = "✓ TEMPLATE TECH COPIÉ";
            setTimeout(() => s.innerText = "", 3000);
        });
    }
</script>

</body>
</html>
