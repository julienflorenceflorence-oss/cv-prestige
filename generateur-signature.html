<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Master Studio v5.4 | Édition Prestige</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #D4AF37;
            --gold: #D4AF37;
            --bg: #0F1115;
            --sidebar-bg: #08090C;
            --panel-bg: rgba(22, 26, 35, 0.98);
            --text: #f4f4f4;
            --border: rgba(212, 175, 55, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 70px;
            background: var(--sidebar-bg);
            border-right: 1px solid #1a1d23;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 25px;
            z-index: 100;
        }

        .sidebar-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 8px;
        }

        .sidebar-icon:hover, .sidebar-icon.active {
            color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }

        .sidebar-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow-y: auto;
        }

        .app-header {
            padding: 30px 0;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .app-header h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 2.2rem;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .app-header .v-tag {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--gold);
            letter-spacing: 2px;
            padding-top: 10px;
        }

        .studio-container {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 50px;
            padding: 20px 60px 60px 60px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        /* Form Panel */
        .form-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 0.65rem;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #222;
            color: #fff;
            font-family: 'Montserrat';
            font-size: 0.85rem;
            border-radius: 4px;
            transition: 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--gold); outline: none; }
        input[type="color"] { height: 45px; padding: 5px; cursor: pointer; }

        .btn-fill-auto {
            width: 100%; padding: 12px; background: rgba(212, 175, 55, 0.05); border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel'; font-size: 0.7rem; cursor: pointer; border-radius: 4px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .btn-fill-auto:hover { background: var(--gold); color: #000; }

        /* Preview Panel */
        .preview-panel {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .signature-wrapper {
            width: 100%;
            background: #000;
            border: 1px solid var(--gold);
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-prestige {
            width: 100%;
            padding: 22px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 4px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.4s;
            text-align: center;
        }

        .btn-prestige:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        #status-text {
            text-align: center;
            font-size: 0.7rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            font-weight: bold;
            height: 20px;
        }

        /* Video Banner */
        .video-banner {
            width: 100%;
            height: 180px;
            overflow: hidden;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .video-banner video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            filter: grayscale(100%) brightness(0.8) contrast(1.2);
            transition: 0.5s;
        }

        .video-banner:hover video {
            opacity: 1;
            filter: grayscale(0%) brightness(1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-icon active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </div>
    <div class="sidebar-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
    </div>
    <div class="sidebar-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </div>
    
    <div class="sidebar-bottom">
        <div class="sidebar-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
        </div>
        <div class="sidebar-icon">
             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        </div>
    </div>
</nav>

<div class="main-content">
    <div class="video-banner">
        <video autoplay loop muted playsinline>
            <source src="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/video/cerveau_42.mp4" type="video/mp4">
        </video>
    </div>
    <header class="app-header">
        <h1>Email Master</h1>
        <span class="v-tag">v5.4 PRESTIGE</span>
    </header>

    <div class="studio-container">
        <div class="form-panel">
            <div class="section-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Identité
            </div>
            <button class="btn-fill-auto" onclick="autoFill()">⚡ Remplissage Automatique</button>
            <div class="input-group"><label>Nom & Prénom</label><input type="text" id="user_name" value="Julien FLORENCE"></div>
            <div class="input-group"><label>Poste</label><input type="text" id="user_job" value="Directeur commercial"></div>
            <div class="input-group"><label>Téléphone</label><input type="text" id="user_phone" value="06 61 74 75 73"></div>
            <div class="input-group"><label>Email</label><input type="text" id="user_email" value="julien.florence@gmail.com"></div>

            <div class="section-title" style="margin-top: 40px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                Visuels
            </div>
            <div class="input-group"><label>URL Photo (ou GIF)</label><input type="text" id="photo_url" value="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/video/tpmp1I8p.gif"></div>
            <div class="input-group"><label>URL Bannière</label><input type="text" id="banner_url" value="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/photo/banniere_hh.png"></div>

            <div class="section-title" style="margin-top: 40px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
                Design
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group"><label>Couleur Fond</label><input type="color" id="bg_page_color" value="#0F1115"></div>
                <div class="input-group"><label>Accent Or</label><input type="color" id="accent_color" value="#D4AF37"></div>
            </div>
        </div>

        <div class="preview-panel">
            <div class="signature-wrapper" id="live_preview_container">
                <div id="live_preview"></div>
            </div>
            
            <div id="status-text">Prêt pour exportation</div>

            <div class="action-btns">
                <button class="btn-prestige" onclick="copyHTML()">Copier le Code Prestige</button>
            </div>
        </div>
    </div>
</div>

<script>
    function autoFill() {
        document.getElementById('user_name').value = "Julien FLORENCE";
        document.getElementById('user_job').value = "Directeur commercial";
        document.getElementById('user_phone').value = "06 61 74 75 73";
        document.getElementById('user_email').value = "julien.florence@gmail.com";
        document.getElementById('photo_url').value = "https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/video/tpmp1I8p.gif";
        document.getElementById('banner_url').value = "https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/photo/banniere_hh.png";
        build();
    }

    function build() {
        const name = document.getElementById('user_name').value;
        const job = document.getElementById('user_job').value;
        const phone = document.getElementById('user_phone').value;
        const email = document.getElementById('user_email').value;
        const photo = document.getElementById('photo_url').value;
        const banner = document.getElementById('banner_url').value;
        const bgColor = document.getElementById('bg_page_color').value;
        const accent = document.getElementById('accent_color').value;

        const html = `
<div style="font-family: Arial, sans-serif; font-size: 14px; background-color: transparent; padding: 20px 0;">
    <!-- ESPACE POUR VOTRE TEXTE D'E-MAIL -->
    <br><br>
</div>
<table cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: ${bgColor}; max-width: 600px; border: 1px solid ${accent};">
    <tr>
        <td style="padding: 0; line-height: 0; background-color: #000; height: 160px; overflow: hidden;">
            <img src="${banner}" width="600" style="display: block; width: 600px; height: 160px; object-fit: cover;">
        </td>
    </tr>
    <tr><td height="4" style="background-color: ${accent}; line-height: 4px; font-size: 4px;">&nbsp;</td></tr>
    <tr>
        <td style="padding: 30px 20px; background-color: ${bgColor};">
            <table cellpadding="0" cellspacing="0" border="0" width="100%">
                <tr>
                    <td width="130" align="center" style="vertical-align: top;">
                        <div style="width: 100px; height: 100px; border: 2px solid ${accent}; border-radius: 50px; overflow: hidden; background-color: #000;">
                            <img src="${photo}" alt="Photo" width="100" height="100" style="display: block; object-fit: cover;">
                        </div>
                    </td>
                    <td style="padding-left: 25px; vertical-align: middle;">
                        <div style="color: ${accent}; font-size: 19px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; font-family: 'Cinzel', serif; margin-bottom: 4px;">${name}</div>
                        <div style="color: #ffffff; font-size: 12px; font-weight: 300; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; margin-bottom: 15px;">${job}</div>
                        
                        <div style="color: ${accent}; font-size: 13px; font-weight: bold;"><a href="tel:${phone.replace(/\s/g, '')}" style="color: ${accent}; text-decoration: none;">T : ${phone}</a></div>
                        <div style="color: #ffffff; font-size: 12px; opacity: 0.6; margin-top: 5px;"><a href="mailto:${email}" style="color: #ffffff; text-decoration: none;">E : ${email}</a></div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>`;
        document.getElementById('live_preview').innerHTML = html;
        return html;
    }

    document.addEventListener('input', build);
    window.onload = build;

    function copyHTML() {
        const code = build();
        navigator.clipboard.writeText(code).then(() => {
            const s = document.getElementById('status-text');
            s.innerText = "✓ CODE PRESTIGE COPIÉ";
            setTimeout(() => s.innerText = "Prêt pour exportation", 3000);
        });
    }
</script>

</body>
</html>
