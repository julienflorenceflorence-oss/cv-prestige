<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Master Studio | Prestige Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00F2FE;
            --bg-page: #0a1128;
            --card-bg: rgba(22, 26, 35, 0.95);
            --text: #f4f4f4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #1a1e26 0%, #000 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-app { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Cinzel', serif; color: var(--primary); font-size: 2rem; letter-spacing: 4px; text-transform: uppercase; }

        .app-container {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 30px;
            align-items: start;
        }

        .form-panel {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        h3 { font-family: 'Cinzel'; font-size: 0.8rem; color: var(--primary); margin: 20px 0 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.65rem; color: #888; margin-bottom: 4px; text-transform: uppercase; }
        input, textarea {
            width: 100%; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid #333; color: #fff; border-radius: 5px; font-family: 'Montserrat'; font-size: 0.8rem;
        }
        input:focus { border-color: var(--primary); outline: none; }

        .color-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        .action-item { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px; margin-bottom: 10px; position: relative; }
        .remove-btn { position: absolute; top: 5px; right: 5px; background: #ff4444; color: white; border: none; border-radius: 3px; font-size: 0.6rem; padding: 2px 5px; cursor: pointer; }
        .add-btn { width: 100%; padding: 10px; background: transparent; border: 1px dashed var(--primary); color: var(--primary); cursor: pointer; border-radius: 5px; font-family: 'Cinzel'; font-size: 0.7rem; }

        .preview-panel { position: sticky; top: 20px; display: flex; flex-direction: column; align-items: center; }
        .signature-wrapper { width: 100%; max-width: 650px; border: 2px solid var(--primary); border-radius: 10px; overflow: hidden; background: #fff; }

        .btn-prestige {
            width: 100%; padding: 18px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-family: 'Cinzel'; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 20px;
        }

        @media (max-width: 1100px) { .app-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header-app">
    <h1>Email Master Studio</h1>
</div>

<div class="app-container">
    <div class="form-panel">
        <h3>🎨 Thème & Couleurs</h3>
        <div class="color-grid">
            <div class="input-group"><label>Boutons</label><input type="color" id="btn_color" value="#0367A6"></div>
            <div class="input-group"><label>Fond Mail</label><input type="color" id="bg_page_color" value="#011F4B"></div>
            <div class="input-group"><label>Accent</label><input type="color" id="accent_color" value="#00F2FE"></div>
        </div>

        <h3>📝 Contenu & Bannière</h3>
        <div class="input-group"><label>URL de la Bannière</label><input type="text" id="banner_url" value="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/histoire%20Happy%20House/baniere/Bannie%CC%80reHH%20entete.png"></div>
        <div class="input-group"><label>Message</label><textarea id="mail_body">Bonjour,</textarea></div>

        <h3>🔘 Boutons d'Action</h3>
        <div id="actions_container"></div>
        <button class="add-btn" onclick="addAction()">+ Ajouter une action</button>
    </div>

    <div class="preview-panel">
        <div class="signature-wrapper" id="live_preview"></div>
        <button class="btn-prestige" onclick="copyHTML()">Copier le Template Final</button>
        <div id="status" style="margin-top:10px; color:var(--primary); font-size:0.8rem; font-weight:bold;"></div>
    </div>
</div>

<script>
    let actions = [
        { label: 'Prendre Rendez-vous', url: 'https://calendar.app.google/iCzfE1GQrjxM3ZQ56' },
        { label: 'Voir mon CV', url: 'https://julienflorenceflorence-oss.github.io/cv-prestige/' },
        { label: 'LinkedIn', url: 'https://www.linkedin.com/in/julien-florence/' }
    ];

    function renderActionsForm() {
        const container = document.getElementById('actions_container');
        container.innerHTML = '';
        actions.forEach((a, i) => {
            const div = document.createElement('div');
            div.className = 'action-item';
            div.innerHTML = `
                <button class="remove-btn" onclick="removeAction(${i})">X</button>
                <div class="input-group"><label>Nom</label><input type="text" value="${a.label}" oninput="updateAction(${i}, 'label', this.value)"></div>
                <div class="input-group"><label>URL</label><input type="text" value="${a.url}" oninput="updateAction(${i}, 'url', this.value)"></div>
            `;
            container.appendChild(div);
        });
        build();
    }

    function addAction() { actions.push({ label: 'Nouveau bouton', url: '#' }); renderActionsForm(); }
    function removeAction(i) { actions.splice(i, 1); renderActionsForm(); }
    function updateAction(i, field, val) { actions[i][field] = val; build(); }

    function build() {
        const name = "Julien";
        const job = "Directeur commercial";
        const phone = "06 61 74 75 73";
        let banner = document.getElementById('banner_url').value;
        if (banner.includes('github.com') && banner.includes('/blob/')) {
            banner = banner.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
        }
        const body = document.getElementById('mail_body').value.replace(/\n/g, '<br>');
        const btnColor = document.getElementById('btn_color').value;
        const bgColor = document.getElementById('bg_page_color').value;
        const accent = document.getElementById('accent_color').value;

        document.documentElement.style.setProperty('--primary', accent);

        let actionsHtml = '';
        actions.forEach(a => {
            actionsHtml += `
                <td style="padding: 10px 5px;">
                    <a href="${a.url}" target="_blank" style="display: inline-block; background-color: ${btnColor}; color: #ffffff; padding: 12px 20px; text-decoration: none; font-size: 10px; font-weight: bold; border-radius: 5px; border: 1px solid ${accent}; text-transform: uppercase; letter-spacing: 1px; font-family: Arial, sans-serif;">${a.label}</a>
                </td>
            `;
        });

        const html = `
<table cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: ${bgColor}; padding: 40px 10px;">
    <tr>
        <td align="center">
            <table cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width: 600px; background-color: #ffffff; border-radius: 0px; overflow: hidden;">
                <tr><td style="padding: 0;"><img src="${banner}" width="600" style="display: block; width: 100%; height: auto;"></td></tr>
                <tr><td height="3" style="background-color: ${accent}; line-height: 3px; font-size: 3px;">&nbsp;</td></tr>
                <tr><td style="padding: 40px; color: ${bgColor}; font-family: Arial, sans-serif; font-size: 16px; line-height: 1.6;">${body}</td></tr>
                <tr>
                    <td style="background-color: ${bgColor}; padding: 40px 20px; text-align: center; font-family: Arial, sans-serif;">
                        <table cellpadding="0" cellspacing="0" border="0" align="center"><tr>${actionsHtml}</tr></table>
                        <div style="height: 1px; background-color: ${btnColor}; margin: 30px auto; width: 80%;"></div>
                        <div style="color: ${accent}; font-size: 18px; font-weight: bold; text-transform: uppercase;">${name}</div>
                        <div style="color: #ffffff; font-size: 14px; margin-top:5px;">${job}</div>
                        <div style="color: ${accent}; font-size: 14px; font-weight: bold; margin-top:5px;">${phone}</div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>`;
        
        document.getElementById('live_preview').innerHTML = html;
        return html;
    }

    document.querySelectorAll('.form-panel input, .form-panel textarea').forEach(el => {
        el.addEventListener('input', build);
    });

    renderActionsForm();

    function copyHTML() {
        const code = build();
        navigator.clipboard.writeText(code).then(() => {
            const s = document.getElementById('status');
            s.innerText = "✓ TEMPLATE COPIÉ";
            setTimeout(() => s.innerText = "", 3000);
        });
    }
</script>

</body>
</html>
