<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Master Studio | Precision Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00F2FE;
            --bg-page: #011F4B;
            --card-bg: rgba(22, 26, 35, 0.95);
            --text: #f4f4f4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #1a1e26 0%, #000 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-app { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Cinzel', serif; color: var(--primary); font-size: 2.5rem; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 20px rgba(0, 242, 254, 0.3); }

        .app-container {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 30px;
            align-items: start;
        }

        .form-panel {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }

        h3 { font-family: 'Cinzel'; font-size: 0.8rem; color: var(--primary); margin: 20px 0 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.65rem; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        input, textarea {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #333; color: #fff; border-radius: 8px; font-family: 'Montserrat'; font-size: 0.85rem; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; }
        input[type="color"] { height: 40px; cursor: pointer; padding: 2px; border-radius: 5px; }
        input[type="range"] { padding: 0; cursor: pointer; height: 8px; }

        .color-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        .action-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; border: 1px solid #333; }
        .remove-btn { position: absolute; top: 8px; right: 8px; background: #ff4444; color: white; border: none; border-radius: 4px; font-size: 0.7rem; padding: 3px 8px; cursor: pointer; }
        .add-btn { width: 100%; padding: 12px; background: transparent; border: 1px dashed var(--primary); color: var(--primary); cursor: pointer; border-radius: 8px; font-family: 'Cinzel'; font-size: 0.75rem; transition: 0.3s; }

        .preview-panel { position: sticky; top: 20px; display: flex; flex-direction: column; align-items: center; }
        .signature-wrapper { width: 100%; max-width: 650px; border: 2px solid var(--primary); border-radius: 10px; overflow: hidden; background: #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }

        .btn-prestige {
            width: 100%; padding: 20px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-family: 'Cinzel'; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: 0.3s; font-size: 0.9rem;
        }
        .btn-prestige:hover { background: #fff; transform: translateY(-3px); }

        @media (max-width: 1100px) { .app-container { grid-template-columns: 1fr; } .preview-panel { position: static; margin-top: 30px; } }
    </style>
</head>
<body>

<div class="header-app">
    <h1>Email Master Studio</h1>
</div>

<div class="app-container">
    <div class="form-panel">
        <h3>🎨 Thème & Couleurs</h3>
        <div class="color-grid">
            <div class="input-group"><label>Boutons</label><input type="color" id="btn_color" value="#0367A6"></div>
            <div class="input-group"><label>Fond Mail</label><input type="color" id="bg_page_color" value="#011F4B"></div>
            <div class="input-group"><label>Accent</label><input type="color" id="accent_color" value="#00F2FE"></div>
        </div>

        <h3>👤 Identité & Ajustements</h3>
        <div class="input-group"><label>Nom & Prénom</label><input type="text" id="user_name" value="Julien FLORENCE"></div>
        <div class="input-group"><label>Titre / Poste</label><input type="text" id="user_job" value="Directeur commercial"></div>
        <div class="input-group"><label>Téléphone</label><input type="text" id="user_phone" value="06 61 74 75 73"></div>
        <div class="input-group"><label>URL Photo de profil</label><input type="text" id="photo_url" value="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/CV%20lettre%20de%20motivation/photo%20moi%20pro.jpeg"></div>
        <div class="input-group"><label>Zoom Photo</label><input type="range" id="photo_zoom" min="80" max="250" value="110"></div>
        <div class="input-group"><label>Position Photo (Haut/Bas)</label><input type="range" id="photo_pos" min="-50" max="50" value="0"></div>

        <h3>📝 Contenu & Bannière</h3>
        <div class="input-group"><label>URL de la Bannière</label><input type="text" id="banner_url" value="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/histoire%20Happy%20House/baniere/Bannie%CC%80reHH%20entete.png"></div>
        <div class="input-group"><label>Message</label><textarea id="mail_body">Bonjour,</textarea></div>

        <h3>🔘 Boutons d'Action</h3>
        <div id="actions_container"></div>
        <button class="add-btn" onclick="addAction()">+ Ajouter une action</button>
    </div>

    <div class="preview-panel">
        <div class="signature-wrapper" id="live_preview_container">
            <div id="live_preview"></div>
        </div>
        <button class="btn-prestige" onclick="copyHTML()">Copier le Template Final</button>
        <div id="status" style="margin-top:15px; color:var(--primary); font-size:0.85rem; font-weight:bold; height: 20px;"></div>
    </div>
</div>

<script>
    let actions = [
        { label: 'Prendre Rendez-vous', url: 'https://calendar.app.google/iCzfE1GQrjxM3ZQ56' },
        { label: 'Voir mon CV', url: 'https://julienflorenceflorence-oss.github.io/cv-prestige/' }
    ];

    function cleanUrl(url) {
        if (!url) return "";
        let u = url.trim();
        // Force le dernier lien si double URL collée
        if (u.includes('http') && u.lastIndexOf('http') > 0) u = u.substring(u.lastIndexOf('http'));
        // Correcteur GitHub
        if (u.includes('github.com') && u.includes('/blob/')) {
            u = u.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
        }
        return u;
    }

    function renderActionsForm() {
        const container = document.getElementById('actions_container');
        container.innerHTML = '';
        actions.forEach((a, i) => {
            const div = document.createElement('div');
            div.className = 'action-item';
            div.innerHTML = `<button class="remove-btn" onclick="removeAction(${i})">X</button>
                <div class="input-group"><label>Nom</label><input type="text" value="${a.label}" oninput="updateAction(${i}, 'label', this.value)"></div>
                <div class="input-group"><label>URL</label><input type="text" value="${a.url}" oninput="updateAction(${i}, 'url', this.value)"></div>`;
            container.appendChild(div);
        });
        build();
    }

    function addAction() { actions.push({ label: 'Nouveau bouton', url: '#' }); renderActionsForm(); }
    function removeAction(i) { actions.splice(i, 1); renderActionsForm(); }
    function updateAction(i, field, val) { actions[i][field] = val; build(); }

    function build() {
        const name = document.getElementById('user_name').value;
        const job = document.getElementById('user_job').value;
        const phone = document.getElementById('user_phone').value;
        const photo = cleanUrl(document.getElementById('photo_url').value);
        const photoZoom = document.getElementById('photo_zoom').value;
        const photoPos = document.getElementById('photo_pos').value;
        const banner = cleanUrl(document.getElementById('banner_url').value);
        const body = document.getElementById('mail_body').value.replace(/\n/g, '<br>');
        const btnColor = document.getElementById('btn_color').value;
        const bgColor = document.getElementById('bg_page_color').value;
        const accent = document.getElementById('accent_color').value;

        document.documentElement.style.setProperty('--primary', accent);
        document.getElementById('live_preview_container').style.borderColor = accent;

        let actionsHtml = '';
        actions.forEach(a => {
            actionsHtml += `<div style="display: inline-block; padding: 10px 5px;"><a href="${a.url}" target="_blank" style="display: inline-block; background-color: ${btnColor}; color: #ffffff; padding: 12px 25px; text-decoration: none; font-size: 11px; font-weight: bold; border-radius: 10px; border: 1px solid ${accent}; text-transform: uppercase; letter-spacing: 1px; font-family: Arial, sans-serif;">${a.label}</a></div>`;
        });

        const html = `
<table cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color: ${bgColor}; padding: 30px 10px;">
    <tr>
        <td align="center">
            <table cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width: 600px; background-color: #ffffff; border-radius: 0px; overflow: hidden; border: 1px solid #eeeeee;">
                <tr><td style="padding: 0; line-height: 0; background-color: #000; height: 10vh; overflow: hidden;"><img src="${banner}" width="600" style="display: block; width: 100%; max-width: 600px; height: 10vh; object-fit: cover;"></td></tr>
                <tr><td height="4" style="background-color: ${accent}; line-height: 4px; font-size: 4px;">&nbsp;</td></tr>
                <tr><td style="padding: 40px; color: #333333; font-family: Arial, sans-serif; font-size: 16px; line-height: 1.6; background-color: #ffffff;">${body}</td></tr>
                <tr>
                    <td style="background-color: ${bgColor}; padding: 40px 20px; text-align: center; font-family: Arial, sans-serif;">
                        <div style="text-align: center; margin-bottom: 20px;">${actionsHtml}</div>
                        <div style="height: 1px; background-color: ${btnColor}; margin: 20px auto; width: 80%; opacity: 0.3;"></div>
                        <table cellpadding="0" cellspacing="0" border="0" width="100%">
                            <tr>
                                <td width="140" align="center" style="vertical-align: top; padding-right: 20px;"><div style="width: 110px; height: 110px; border: 3px solid ${accent}; border-radius: 55px; overflow: hidden; background-color: #000; position: relative;"><img src="${photo}" alt="Photo" width="${photoZoom}" style="display: block; position: relative; top: ${photoPos}px; margin: auto;"></div></td>
                                <td align="left" style="vertical-align: middle;"><div style="color: ${accent}; font-size: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">${name}</div><div style="color: #ffffff; font-size: 14px; margin-top:5px; font-weight: bold; text-transform: uppercase; opacity: 0.8;">${job}</div><div style="color: ${accent}; font-size: 14px; font-weight: bold; margin-top:8px;">${phone}</div><div style="color: #ffffff; font-size: 11px; margin-top:5px; opacity: 0.6;">julien.florence@gmail.com</div></td>
                            </tr>
                        </table>
                        <div style="height: 1px; background-color: ${btnColor}; margin: 30px auto; width: 80%; opacity: 0.3;"></div>
                        <div style="color: ${accent}; font-size: 12px; font-weight: bold; letter-spacing: 1px; margin-bottom: 15px; text-transform: uppercase;">TÉLÉCHARGEZ NOTRE APPLICATION</div>
                        <table cellpadding="0" cellspacing="0" border="0" align="center">
                            <tr>
                                <td style="padding: 0 10px;"><img src="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/histoire%20Happy%20House/doc%20HH/appli-2.jpg" alt="App Store" width="125" style="border-radius: 6px;"></td>
                                <td style="padding: 0 10px;"><img src="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/histoire%20Happy%20House/doc%20HH/appli-2.jpg" alt="Google Play" width="125" style="border-radius: 6px;"></td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>`;
        document.getElementById('live_preview').innerHTML = html;
        return html;
    }

    document.addEventListener('input', build);
    renderActionsForm();

    function copyHTML() {
        const code = build();
        navigator.clipboard.writeText(code).then(() => {
            const s = document.getElementById('status');
            s.innerText = "✓ CODE COPIÉ AVEC SUCCÈS";
            setTimeout(() => s.innerText = "", 3000);
        });
    }
</script>

</body>
</html>
