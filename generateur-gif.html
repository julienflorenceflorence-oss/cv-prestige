<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Master Studio v7.5 | Turbo Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        :root {
            --primary: #9b59b6; /* VIOLET POUR PREUVE DE v7.5 */
            --gold: #D4AF37;
            --bg: #0F1115;
            --card-bg: rgba(22, 26, 35, 0.95);
            --text: #f4f4f4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #000;
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-app { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Cinzel', serif; color: var(--primary); font-size: 2.2rem; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 15px var(--primary); }
        .v-tag { background: var(--primary); color: #fff; padding: 2px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; margin-left: 10px; }

        .app-container {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
            align-items: start;
        }

        .form-panel {
            background: var(--card-bg);
            border: 1px solid var(--primary);
            padding: 25px;
            border-radius: 10px;
        }

        h3 { font-family: 'Cinzel'; font-size: 0.8rem; color: var(--gold); margin: 20px 0 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.65rem; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        input, select, textarea {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #333; color: #fff; border-radius: 8px; font-family: 'Montserrat'; font-size: 0.85rem;
        }

        .preview-panel { position: sticky; top: 20px; display: flex; flex-direction: column; align-items: center; }
        .gif-preview-box {
            width: 100%;
            max-width: 480px;
            background: #000;
            border: 3px solid var(--gold);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gif-preview-box video, .gif-preview-box img { width: 100%; height: auto; display: block; }
        
        .caption-overlay {
            position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center;
            font-family: 'Cinzel', serif; font-size: 0.9rem; color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,1); letter-spacing: 1px; z-index: 5;
        }

        .btn-prestige {
            width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 10px; font-family: 'Cinzel'; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; font-size: 0.85rem; margin-top: 15px;
        }
        .btn-prestige:hover { background: #fff; transform: translateY(-2px); }
        .btn-prestige:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-download { background: var(--primary); display: none; text-decoration: none; text-align: center; color: #fff; font-size: 0.85rem; }

        #progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 25px; margin-top: 20px; border-radius: 5px; display: none; overflow: hidden; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.1s; }
        #progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.75rem; font-weight: bold; line-height: 25px; color: #fff; z-index: 10; }

        @media (max-width: 1100px) { .app-container { grid-template-columns: 1fr; } .preview-panel { position: static; } }
    </style>
</head>
<body>

<div class="header-app">
    <h1>GIF Master Studio <span class="v-tag">v7.5 TURBO</span></h1>
</div>

<div class="app-container">
    <div class="form-panel">
        <h3>🎬 Média Source</h3>
        <div class="input-group">
            <label>1. Sélectionner MP4</label>
            <input type="file" id="local_video" accept="video/mp4,video/webm">
        </div>

        <h3>📝 Personnalisation</h3>
        <div class="input-group">
            <label>Description du rendu</label>
            <textarea id="gif_caption" placeholder="Ex: IA PRESTIGE 2026"></textarea>
        </div>

        <h3>⚙️ Réglages Rapides</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group">
                <label>Vitesse</label>
                <select id="fps_rate">
                    <option value="12" selected>12 FPS (Plus rapide)</option>
                    <option value="15">15 FPS (Standard)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Durée</label>
                <input type="number" id="capture_duration" value="2" min="1" max="3" step="0.5">
            </div>
        </div>
    </div>

    <div class="preview-panel">
        <div class="gif-preview-box">
            <div id="media_container" style="width:100%;">
                <p style="color:#555; font-size:0.7rem;">Charger une vidéo pour commencer...</p>
            </div>
            <div class="caption-overlay" id="caption_preview"></div>
            <canvas id="capture_canvas" style="display:none;"></canvas>
        </div>
        
        <div id="progress-container">
            <div id="progress-text">Prêt à la génération</div>
            <div id="progress-bar"></div>
        </div>
        
        <button id="generate_btn" class="btn-prestige" onclick="generateGIF()">Générer le GIF Turbo</button>
        <a id="download_btn" class="btn-prestige btn-download" download="prestige_animation.gif">Télécharger le GIF</a>
        
        <div id="status" style="margin-top:15px; color:var(--primary); font-size:0.8rem; font-weight:bold; text-align: center;"></div>
    </div>
</div>

<script>
    function build() {
        const url = document.getElementById('source_url_hidden')?.value || "";
        const container = document.getElementById('media_container');
        document.getElementById('caption_preview').innerText = document.getElementById('gif_caption').value;
        document.getElementById('download_btn').style.display = 'none';

        if (!url) return;
        container.innerHTML = `<video id="preview_video" src="${url}" autoplay loop muted playsinline style="width:100%;"></video>`;
    }

    document.getElementById('local_video').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            let hidden = document.getElementById('source_url_hidden');
            if (!hidden) {
                hidden = document.createElement('input');
                hidden.type = "hidden"; hidden.id = "source_url_hidden";
                document.body.appendChild(hidden);
            }
            hidden.value = url;
            build();
        }
    });

    async function generateGIF() {
        const video = document.getElementById('preview_video');
        const btn = document.getElementById('generate_btn');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const progText = document.getElementById('progress-text');
        const progCont = document.getElementById('progress-container');

        if (!video) { status.innerText = "Sélectionnez d'abord une vidéo."; return; }

        btn.disabled = true;
        progCont.style.display = 'block';
        status.innerText = "Capture...";

        const fps = parseInt(document.getElementById('fps_rate').value);
        const duration = parseFloat(document.getElementById('capture_duration').value);
        const frameCount = Math.floor(duration * fps);
        const delay = 1000 / fps;

        // RÉSOLUTION RÉDUITE POUR LE TURBO (400px)
        const gif = new GIF({
            workers: 0, quality: 30, width: 400, height: 225,
            workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
        });

        const canvas = document.getElementById('capture_canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 225;

        video.pause();
        video.currentTime = 0;
        await new Promise(r => setTimeout(r, 800));

        for (let i = 0; i < frameCount; i++) {
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,400,225);
            ctx.drawImage(video, 0, 0, 400, 225);
            
            const caption = document.getElementById('gif_caption').value;
            if (caption) {
                ctx.font = "bold 20px Cinzel"; ctx.fillStyle = "white"; ctx.textAlign = "center";
                ctx.shadowColor = "black"; ctx.shadowBlur = 5;
                ctx.fillText(caption, 200, 210);
            }
            
            gif.addFrame(ctx, {copy: true, delay: delay});
            video.currentTime += (1/fps);
            
            const p = Math.round((i / frameCount) * 50);
            progress.style.width = p + "%";
            progText.innerText = "Capture : " + p + "%";
            await new Promise(r => setTimeout(r, 50));
        }

        video.play();
        status.innerText = "Encodage Turbo...";
        progText.innerText = "Encodage... 60%";
        
        gif.on('progress', p => {
            const totalP = 50 + Math.round(p * 50);
            progress.style.width = totalP + "%";
            progText.innerText = "Encodage : " + totalP + "%";
        });

        gif.on('finished', blob => {
            document.getElementById('download_btn').href = URL.createObjectURL(blob);
            document.getElementById('download_btn').style.display = 'block';
            btn.disabled = false;
            status.innerText = "✓ GIF PRÊT !";
            progText.innerText = "100% - Succès";
        });

        gif.render();
    }

    document.getElementById('gif_caption').addEventListener('input', () => {
        document.getElementById('caption_preview').innerText = document.getElementById('gif_caption').value;
    });
</script>
</body>
</html>
