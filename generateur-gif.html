<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Master Studio v8.2 | Édition Prestige</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Script principal chargé depuis un CDN fiable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        :root {
            --primary: #D4AF37;
            --gold: #D4AF37;
            --bg: #0F1115;
            --card-bg: rgba(22, 26, 35, 0.98);
            --text: #f4f4f4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-app { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.2rem; letter-spacing: 6px; text-transform: uppercase; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .v-tag { border: 1px solid var(--gold); color: var(--gold); padding: 2px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-left: 10px; vertical-align: middle; }

        .app-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 40px;
        }

        .form-panel {
            background: var(--card-bg);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 30px;
            border-radius: 4px;
        }

        h3 { font-family: 'Cinzel'; font-size: 0.85rem; color: var(--gold); margin: 25px 0 15px 0; border-bottom: 1px solid rgba(212,175,55,0.1); padding-bottom: 8px; letter-spacing: 2px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 6px; text-transform: uppercase; }
        input, select, textarea {
            width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 4px; font-family: 'Montserrat'; font-size: 0.9rem;
        }

        .preview-panel { display: flex; flex-direction: column; align-items: center; }
        .gif-preview-box {
            width: 100%;
            max-width: 600px;
            background: #000;
            border: 1px solid var(--gold);
            padding: 5px;
            position: relative;
            aspect-ratio: 1/1; /* Carré pour les signatures */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .gif-preview-box video, .gif-preview-box img { width: 100%; height: 100%; object-fit: cover; }

        .btn-prestige {
            width: 100%; padding: 20px; background: var(--gold); color: #000; border: none; border-radius: 4px; font-family: 'Cinzel'; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.4s; font-size: 0.9rem; margin-top: 20px;
        }
        .btn-prestige:hover { background: #fff; }
        .btn-prestige:disabled { opacity: 0.3; cursor: not-allowed; }

        #progress-container { width: 100%; background: #000; height: 30px; margin-top: 20px; border: 1px solid #222; display: none; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: var(--gold); transition: width 0.1s; }
        #progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.7rem; line-height: 30px; color: #fff; z-index: 10; font-weight: bold; }

        #status { margin-top: 20px; color: var(--gold); font-size: 0.8rem; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-app">
    <h1>GIF Studio <span class="v-tag">v8.2 PRESTIGE</span></h1>
</div>

<div class="app-container">
    <div class="form-panel">
        <h3>🎬 Source</h3>
        <div class="input-group">
            <label>Vidéo (MP4)</label>
            <input type="file" id="local_video" accept="video/mp4">
        </div>

        <h3>⚙️ Paramètres</h3>
        <div class="input-group">
            <label>Format</label>
            <select id="gif_format">
                <option value="square">Carré (1:1) - Signature</option>
                <option value="hd">HD (16:9)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Durée (sec)</label>
            <input type="number" id="capture_duration" value="2.0" min="0.5" max="5" step="0.5">
        </div>
        <div class="input-group">
            <label>Qualité (1-20)</label>
            <input type="number" id="gif_quality" value="10" min="1" max="20">
        </div>
    </div>

    <div class="preview-panel">
        <div class="gif-preview-box" id="media_container">
            <p style="color:#444;">Sélectionnez une vidéo...</p>
        </div>
        
        <div id="progress-container">
            <div id="progress-text">Prêt</div>
            <div id="progress-bar"></div>
        </div>
        
        <button id="generate_btn" class="btn-prestige" onclick="generateGIF()">Générer le GIF</button>
        <a id="download_btn" class="btn-prestige" style="display:none; background:#fff; text-decoration:none; text-align:center;" download="signature_prestige.gif">Télécharger le GIF</a>
        
        <div id="status"></div>
    </div>
</div>

<canvas id="capture_canvas" style="display:none;"></canvas>

<script>
    let videoUrl = "";

    document.getElementById('local_video').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            videoUrl = URL.createObjectURL(file);
            document.getElementById('media_container').innerHTML = `<video id="preview_video" src="${videoUrl}" autoplay loop muted playsinline></video>`;
            document.getElementById('status').innerText = "Vidéo chargée : " + file.name;
        }
    });

    async function generateGIF() {
        const video = document.getElementById('preview_video');
        if (!video) return alert("Veuillez d'abord charger une vidéo.");

        const btn = document.getElementById('generate_btn');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress-bar');
        const progText = document.getElementById('progress-text');
        const progCont = document.getElementById('progress-container');

        btn.disabled = true;
        progCont.style.display = 'block';
        status.innerText = "Initialisation...";

        const duration = parseFloat(document.getElementById('capture_duration').value);
        const quality = parseInt(document.getElementById('gif_quality').value);
        const format = document.getElementById('gif_format').value;
        
        const fps = 15;
        const frameCount = Math.floor(duration * fps);
        const size = (format === 'square') ? 400 : 640;
        const width = size;
        const height = (format === 'square') ? size : 360;

        const gif = new GIF({
            workers: 2,
            quality: quality,
            width: width,
            height: height,
            workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
        });

        const canvas = document.getElementById('capture_canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = width;
        canvas.height = height;

        video.pause();
        video.currentTime = 0;
        
        status.innerText = "Capture des trames...";

        for (let i = 0; i < frameCount; i++) {
            // Dessin avec recadrage central pour le mode carré
            if (format === 'square') {
                const minDim = Math.min(video.videoWidth, video.videoHeight);
                const sx = (video.videoWidth - minDim) / 2;
                const sy = (video.videoHeight - minDim) / 2;
                ctx.drawImage(video, sx, sy, minDim, minDim, 0, 0, width, height);
            } else {
                ctx.drawImage(video, 0, 0, width, height);
            }

            gif.addFrame(ctx, {copy: true, delay: 1000 / fps});
            video.currentTime += (1 / fps);
            
            const p = Math.round((i / frameCount) * 100);
            progress.style.width = p + "%";
            progText.innerText = "Capture : " + p + "%";
            
            await new Promise(r => setTimeout(r, 50));
        }

        status.innerText = "Encodage final...";
        progText.innerText = "Encodage...";

        gif.on('progress', p => {
            const val = Math.round(p * 100);
            progress.style.width = val + "%";
            progText.innerText = "Encodage : " + val + "%";
        });

        gif.on('finished', blob => {
            const url = URL.createObjectURL(blob);
            const downloadBtn = document.getElementById('download_btn');
            downloadBtn.href = url;
            downloadBtn.style.display = 'block';
            
            const img = document.createElement('img');
            img.src = url;
            document.getElementById('media_container').innerHTML = '';
            document.getElementById('media_container').appendChild(img);
            
            btn.disabled = false;
            status.innerText = "✓ GIF généré avec succès !";
            progText.innerText = "Terminé";
        });

        gif.render();
    }
</script>
</body>
</html>
