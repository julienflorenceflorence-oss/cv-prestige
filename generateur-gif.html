<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Master Studio | Premium Production</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Intégration de gif.js pour la génération côté client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        :root {
            --primary: #00F2FE;
            --gold: #D4AF37;
            --bg: #0F1115;
            --card-bg: rgba(22, 26, 35, 0.95);
            --text: #f4f4f4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #1a1e26 0%, #000 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-app { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.5rem; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }

        .app-container {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 30px;
            align-items: start;
        }

        .form-panel {
            background: var(--card-bg);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        h3 { font-family: 'Cinzel'; font-size: 0.9rem; color: var(--gold); margin: 20px 0 15px 0; border-bottom: 1px solid rgba(212, 175, 55, 0.2); padding-bottom: 5px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
        input, select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #333; color: #fff; border-radius: 8px; font-family: 'Montserrat'; font-size: 0.85rem;
        }
        input:focus { border-color: var(--primary); outline: none; }

        .test-btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn-test { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid #444; color: #ccc; font-size: 0.7rem; border-radius: 5px; cursor: pointer; text-transform: uppercase; font-family: 'Cinzel'; }
        .btn-test:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        .preview-panel { position: sticky; top: 20px; display: flex; flex-direction: column; align-items: center; }
        .gif-preview-box {
            width: 100%;
            max-width: 600px;
            background: #000;
            border: 3px solid var(--gold);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            min-height: 200px;
        }

        .gif-preview-box video, .gif-preview-box img, .gif-preview-box canvas { width: 100%; display: block; }

        .fps-counter {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: bold;
            border: 1px solid var(--primary);
            z-index: 10;
        }

        .btn-prestige {
            width: 100%; padding: 18px; background: var(--gold); color: #000; border: none; border-radius: 10px; font-family: 'Cinzel'; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 15px; transition: 0.3s; font-size: 0.85rem;
        }
        .btn-prestige:hover { background: #fff; transform: translateY(-3px); }
        .btn-prestige:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-download {
            background: var(--primary);
            display: none;
            text-decoration: none;
            color: #000;
            text-align: center;
        }

        #progress-container {
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 4px;
            margin-top: 10px;
            border-radius: 2px;
            display: none;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.1s;
        }

        @media (max-width: 1100px) { .app-container { grid-template-columns: 1fr; } .preview-panel { position: static; margin-top: 30px; } }
    </style>
</head>
<body>

<div class="header-app">
    <h1>GIF Master Studio</h1>
</div>

<div class="app-container">
    <div class="form-panel">
        <h3>🎬 Source Vidéo / Image</h3>
        <div class="input-group">
            <label>URL de la source (Hébergée)</label>
            <input type="text" id="source_url" value="https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/histoire%20Happy%20House/baniere/Bannie%CC%80reHH%20entete.png">
        </div>
        <div class="test-btns">
            <button class="btn-test" onclick="setTest('photo')">Tester Photo</button>
            <button class="btn-test" onclick="setTest('banner')">Tester Bannière</button>
        </div>

        <h3>⚙️ Paramètres Premium</h3>
        <div class="input-group">
            <label>Frame Rate (FPS)</label>
            <select id="fps_rate">
                <option value="30">30 FPS (Ultra-Fluide)</option>
                <option value="24" selected>24 FPS (Cinématique)</option>
                <option value="15">15 FPS (Standard)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Durée de capture (sec)</label>
            <input type="number" id="capture_duration" value="2.5" min="0.5" max="5" step="0.5">
        </div>
    </div>

    <div class="preview-panel">
        <h2 style="font-family: 'Cinzel'; color: var(--gold); font-size: 0.9rem; margin-bottom: 15px;">Simulateur de Rendu Haute Fidélité</h2>
        <div class="gif-preview-box">
            <div class="fps-counter" id="fps_display">24 FPS</div>
            <div id="media_container"></div>
            <canvas id="capture_canvas" style="display:none;"></canvas>
        </div>
        
        <div id="progress-container"><div id="progress-bar"></div></div>
        
        <button id="generate_btn" class="btn-prestige" onclick="generateGIF()">Générer le fichier GIF</button>
        <a id="download_btn" class="btn-prestige btn-download" download="prestige_animation.gif">Télécharger le format GIF</a>
        
        <div id="status" style="margin-top:15px; color:var(--primary); font-size:0.85rem; font-weight:bold;"></div>
    </div>
</div>

<script>
    let gifBlob = null;

    function fixUrl(url) {
        if (!url) return "";
        let clean = url.trim();
        if (clean.includes('github.com') && clean.includes('/blob/')) {
            clean = clean.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
        }
        return clean;
    }

    function build() {
        const url = fixUrl(document.getElementById('source_url').value);
        const fps = document.getElementById('fps_rate').value;
        const container = document.getElementById('media_container');
        document.getElementById('fps_display').innerText = fps + " FPS";
        document.getElementById('download_btn').style.display = 'none';

        if (!url) return;

        const isVideo = url.toLowerCase().includes('.mp4') || url.toLowerCase().includes('.webm');
        
        container.innerHTML = '';
        if (isVideo) {
            container.innerHTML = `<video id="preview_video" src="${url}" crossorigin="anonymous" autoplay loop muted playsinline style="width:100%;"></video>`;
        } else {
            container.innerHTML = `<img id="preview_img" src="${url}" crossorigin="anonymous" alt="Preview" style="width:100%;">`;
        }
    }

    function setTest(type) {
        const urls = {
            photo: 'https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/CV%20lettre%20de%20motivation/photo%20moi%20pro.jpeg',
            banner: 'https://raw.githubusercontent.com/julienflorenceflorence-oss/cv-prestige/main/histoire%20Happy%20House/baniere/Bannie%CC%80reHH%20entete.png'
        };
        document.getElementById('source_url').value = urls[type];
        build();
    }

    async function generateGIF() {
        const video = document.getElementById('preview_video');
        const img = document.getElementById('preview_img');
        const btn = document.getElementById('generate_btn');
        const status = document.getElementById('status');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');

        if (!video && !img) {
            status.innerText = "Erreur : Média non chargé.";
            return;
        }

        btn.disabled = true;
        btn.innerText = "Traitement...";
        status.innerText = "Capture des images en cours...";
        progressContainer.style.display = 'block';
        progressBar.style.width = "0%";

        const fps = parseInt(document.getElementById('fps_rate').value);
        const duration = parseFloat(document.getElementById('capture_duration').value);
        const frameCount = Math.floor(duration * fps);
        const delay = Math.round(1000 / fps);

        const gif = new GIF({
            workers: 2,
            quality: 5,
            width: 600,
            height: 337,
            workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
        });

        const canvas = document.getElementById('capture_canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 337;

        try {
            if (video) {
                video.pause();
                video.currentTime = 0;
                
                for (let i = 0; i < frameCount; i++) {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    gif.addFrame(ctx, {copy: true, delay: delay});
                    video.currentTime += (1 / fps);
                    progressBar.style.width = ((i / frameCount) * 50) + "%";
                    // Petit délai pour laisser le navigateur souffler
                    await new Promise(r => setTimeout(r, 40));
                }
                video.play();
            } else {
                // Pour une image fixe, on simule une animation de zoom
                for (let i = 0; i < 20; i++) {
                    const zoom = 1 + (i * 0.01);
                    const w = canvas.width * zoom;
                    const h = canvas.height * zoom;
                    const x = (canvas.width - w) / 2;
                    const y = (canvas.height - h) / 2;
                    ctx.fillStyle = "#000";
                    ctx.fillRect(0,0,canvas.width,canvas.height);
                    ctx.drawImage(img, x, y, w, h);
                    gif.addFrame(ctx, {copy: true, delay: 100});
                    progressBar.style.width = ((i / 20) * 50) + "%";
                    await new Promise(r => setTimeout(r, 20));
                }
            }

            status.innerText = "Encodage du fichier GIF final...";
            
            gif.on('progress', p => {
                progressBar.style.width = (50 + (p * 50)) + "%";
            });

            gif.on('finished', blob => {
                gifBlob = blob;
                const url = URL.createObjectURL(blob);
                const downloadBtn = document.getElementById('download_btn');
                downloadBtn.href = url;
                downloadBtn.style.display = 'block';
                
                btn.disabled = false;
                btn.innerText = "Générer à nouveau";
                status.innerText = "✓ GIF PRÊT AU TÉLÉCHARGEMENT";
                progressContainer.style.display = 'none';
            });

            gif.render();
        } catch (err) {
            console.error(err);
            status.innerText = "Erreur technique lors de la génération.";
            btn.disabled = false;
            btn.innerText = "Réessayer";
        }
    }

    document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', build));
    build();
</script>

</body>
</html>
